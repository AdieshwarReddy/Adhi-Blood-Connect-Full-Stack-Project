

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=adhi_blood_connect
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7.0-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
